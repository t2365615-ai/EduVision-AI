<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVision AI - Protótipo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
        }

        /* TELA DE LOGIN */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h1 {
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .login-container p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #1e3c72;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2a5298;
        }

        /* PAINEL PRINCIPAL (DASHBOARD) */
        #dashboard-screen {
            display: none; /* Escondido inicialmente */
        }

        header {
            background-color: #1e3c72;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Cards do Dashboard */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid #1e3c72;
        }

        .card.ise { border-left-color: #2ecc71; }
        .card.alerta { border-left-color: #e74c3c; }

        .card h3 {
            font-size: 14px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card .value {
            font-size: 28px;
            font-weight: bold;
            color: #222;
        }

        /* Seção de Cadastro e Tabela */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 800px) {
            .content-grid { grid-template-columns: 1fr; }
        }

        .form-section, .table-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .form-section h2, .table-section h2 {
            margin-bottom: 20px;
            color: #1e3c72;
            font-size: 18px;
            border-bottom: 2px solid #f4f6f9;
            padding-bottom: 10px;
        }

        /* Tabela de Alunos */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .status-bom { background-color: #d4edda; color: #155724; }
        .status-atencao { background-color: #fff3cd; color: #856404; }
        .status-critico { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-container">
            <h1>EduVision AI</h1>
            <p>Painel de Controle da Coordenação</p>
            <form id="login-form" onsubmit="fazerLogin(event)">
                <div class="input-group">
                    <label>E-mail institucional</label>
                    <input type="email" value="coordenacao@escola.com" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" value="123456" required>
                </div>
                <button type="submit" class="btn">Entrar no Sistema</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen">
        <header>
            <h2>🎓 EduVision AI</h2>
            <span>Coordenador Conectado</span>
        </header>

        <div class="container">
            <div class="metrics-grid">
                <div class="card ise">
                    <h3>❤️ Saúde Escolar (ISE)</h3>
                    <div class="value" id="ise-val">82/100</div>
                </div>
                <div class="card">
                    <h3>👥 Alunos Monitorados</h3>
                    <div class="value" id="total-alunos">3</div>
                </div>
                <div class="card alerta">
                    <h3>⚠️ Casos de Risco</h3>
                    <div class="value" id="casos-risco">1</div>
                </div>
            </div>

            <div class="content-grid">
                <div class="form-section">
                    <h2>📝 Cadastrar/Escrever Aluno</h2>
                    <form id="cadastro-form" onsubmit="cadastrarAluno(event)">
                        <div class="input-group">
                            <label>Nome Completo</label>
                            <input type="text" id="nome" placeholder="Ex: João Silva" required>
                        </div>
                        <div class="input-group">
                            <label>Turma</label>
                            <input type="text" id="turma" placeholder="Ex: 1º Ano A" required>
                        </div>
                        <div class="input-group">
                            <label>Média Atual (0 a 10)</label>
                            <input type="number" id="nota" step="0.1" min="0" max="10" placeholder="Ex: 5.5" required>
                        </div>
                        <div class="input-group">
                            <label>Frequência (%)</label>
                            <input type="number" id="frequencia" min="0" max="100" placeholder="Ex: 72" required>
                        </div>
                        <button type="submit" class="btn">Analisar com IA</button>
                    </form>
                </div>

                <div class="table-section">
                    <h2>📊 Lista de Alunos e Diagnósticos da IA</h2>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Turma</th>
                                    <th>Nota</th>
                                    <th>Frequência</th>
                                    <th>Status / Ação recomendada pela IA</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-corpo">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Banco de dados simulado inicial
        let listaAlunos = [
            { nome: "Ana Costa", turma: "3º Ano C", nota: 4.5, frequencia: 68 },
            { nome: "Pedro Santos", turma: "2º Ano B", nota: 8.5, frequencia: 95 },
            { nome: "Maria Oliveira", turma: "1º Ano A", nota: 6.2, frequencia: 88 }
        ];

        // Função de Login Simples
        function fazerLogin(event) {
            event.preventDefault();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
            atualizarTela();
        }

        // Função para Cadastrar Aluno digitado pela Coordenação
        function cadastrarAluno(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value;
            const turma = document.getElementById('turma').value;
            const nota = parseFloat(document.getElementById('nota').value);
            const frequencia = parseInt(document.getElementById('frequencia').value);

            // Adiciona na lista
            listaAlunos.push({ nome, turma, nota, frequencia });

            // Limpa o formulário
            document.getElementById('cadastro-form').reset();

            // Atualiza o painel visual
            atualizarTela();
        }

        // Função que processa a lógica de IA e atualiza o HTML
        function atualizarTela() {
            const corpoTabela = document.getElementById('tabela-corpo');
            corpoTabela.innerHTML = ''; // Limpa tabela

            let totalAlunos = listaAlunos.length;
            let casosRisco = 0;
            let somaISE = 0;

            listaAlunos.forEach(aluno => {
                let statusBadge = '';
                let recomendacaoIA = '';

                // Regras da Inteligência Artificial Preditiva
                if (aluno.frequencia < 75) {
                    casosRisco++;
                    statusBadge = '<span class="status-badge status-critico">🔴 Risco Alto</span>';
                    recomendacaoIA = 'Risco de Evasão por faltas. Enviar alerta aos pais e agendar reunião.';
                    somaISE += 40; // Peso baixo para a saúde escolar
                } else if (aluno.nota < 6.0) {
                    casosRisco++;
                    statusBadge = '<span class="status-badge status-atencao">🟡 Atenção</span>';
                    recomendacaoIA = 'Desempenho baixo. Indicar para aulas de Reforço Escolar.';
                    somaISE += 60;
                } else {
                    statusBadge = '<span class="status-badge status-bom">🟢 Estável</span>';
                    recomendacaoIA = 'Bom rendimento. Manter acompanhamento padrão.';
                    somaISE += 95;
                }

                // Cria a linha na tabela
                const linha = `
                    <tr>
                        <td><strong>${aluno.nome}</strong></td>
                        <td>${aluno.turma}</td>
                        <td>${aluno.nota.toFixed(1)}</td>
                        <td>${aluno.frequencia}%</td>
                        <td>${statusBadge} <br> <small style="color:#555">${recomendacaoIA}</small></td>
                    </tr>
                `;
                corpoTabela.innerHTML += linha;
            });

            // Atualiza os Cards Superiores
            document.getElementById('total-alunos').innerText = totalAlunos;
            document.getElementById('casos-risco').innerText = casosRisco;
            
            // Calcula o Índice de Saúde Escolar médio
            let iseMedio = Math.round(somaISE / totalAlunos);
            document.getElementById('ise-val').innerText = `${iseMedio}/100`;
        }
    </script>
</body>
                  </html>
